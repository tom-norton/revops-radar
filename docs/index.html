<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RevOps Radar</title>
<style>
  :root{
    --teal:#117A82; --ink:#1B2224; --sub:#5D6B6E; --bg:#F7F9F9;
    --card:#FFFFFF; --line:#DCE4E4; --good:#1E874B; --warn:#B8770B; --mut:#8A9699;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#E8EEEE; --sub:#93A3A5; --bg:#101617; --card:#182022;
           --line:#263235; --teal:#2FA6AE; --good:#3FBE72; --warn:#E0A93B; --mut:#5D6B6E; }
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--bg); color:var(--ink);
       font:15px/1.5 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       max-width:720px; margin:0 auto; padding:22px 16px 70px}
  a{color:var(--teal)}
  h1{font-size:25px; letter-spacing:-.02em; font-weight:800}
  h1 span{color:var(--teal)}
  .meta{color:var(--sub); font-size:12.5px; margin:5px 0 20px}
  h2{font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--sub);
     margin:26px 0 10px; font-weight:700}

  .job{background:var(--card); border:1px solid var(--line); border-radius:11px;
       padding:14px; margin-bottom:11px}
  .row1{display:flex; gap:12px; align-items:flex-start}
  .score{font-weight:700; font-size:18px; min-width:46px; height:44px;
         display:flex; align-items:center; justify-content:center; border-radius:9px;
         background:var(--teal); color:#fff; flex-shrink:0}
  .score.s-apply{background:var(--good)} .score.s-border{background:var(--warn)}
  .hd{flex:1; min-width:0}
  .title{font-weight:650; font-size:15.5px; line-height:1.35}
  .company{color:var(--sub); font-size:13px; margin-top:1px}
  .verdict{font-size:13.5px; margin:10px 0 0; color:var(--ink)}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
  .tag{font-size:11px; padding:3px 8px; border-radius:20px; border:1px solid var(--line);
       color:var(--sub); white-space:nowrap}
  .tag.spon{border-color:var(--good); color:var(--good)}
  .tag.nospon{border-color:var(--warn); color:var(--warn)}
  .tag.flag{border-color:var(--warn); color:var(--warn)}
  .dims{display:flex; flex-wrap:wrap; gap:4px 14px; margin-top:11px;
        font-size:11.5px; color:var(--sub)}
  .dims b{color:var(--ink); font-weight:650}
  .foot{display:flex; justify-content:space-between; align-items:center;
        margin-top:11px; font-size:12px}
  .foot a{font-weight:650; text-decoration:none}
  .foot .src{color:var(--mut)}
  .actions{display:flex; gap:8px; margin-top:11px}
  .actions button{font:600 11.5px -apple-system,"Segoe UI",Roboto,sans-serif;
        padding:6px 11px; border-radius:20px; border:1px solid var(--line);
        background:transparent; color:var(--sub); cursor:pointer}
  .actions button:hover{border-color:var(--teal); color:var(--teal)}
  .actions button[data-act="applied"]:hover{border-color:var(--good); color:var(--good)}
  .actions .status{font-size:11px; padding:3px 8px; border-radius:20px; color:var(--sub)}
  .job.reviewed{opacity:.6}
  details.borderline>summary,details.reviewed>summary{cursor:pointer; color:var(--sub);
        font-size:13px; list-style:none; user-select:none}
  details.borderline>summary::-webkit-details-marker,
  details.reviewed>summary::-webkit-details-marker{display:none}
  details.borderline>summary::before,details.reviewed>summary::before{content:"\25B8 "; color:var(--mut)}
  details.borderline[open]>summary::before,details.reviewed[open]>summary::before{content:"\25BE "}
  .empty{color:var(--sub); font-size:14px; padding:14px 0}
  .note{color:var(--mut); font-size:11.5px; margin:-14px 0 20px}
  .sources{margin-top:34px; border-top:1px solid var(--line); padding-top:14px;
        font-size:11.5px; color:var(--mut)}
  .sources div{margin:3px 0}
  .sources .ok{color:var(--sub)} .sources .bad{color:var(--warn)}
</style>
</head>
<body>
  <h1><span>RevOps</span> Radar</h1>
  <div class="meta" id="meta">Loading…</div>
  <div class="note" id="synclabel">Hide / Mark applied are saved in this browser only — they won't follow you to another device.</div>

  <div id="apply-wrap">
    <h2 id="apply-h">Apply — 6.0 and up</h2>
    <div id="apply"></div>
  </div>

  <div id="border-wrap"></div>
  <div id="reviewed-wrap"></div>

  <div class="sources" id="sources"></div>

<script>
const GATE = 6.0, FLOOR = 5.0;
const DIMS = [["experience","Exp"],["skills","Skills"],["seniority","Sen"],
              ["domain","Domain"],["location_visa","Loc/Visa"],["trajectory","Traj"]];

function loadSet(key){
  try{ return new Set(JSON.parse(localStorage.getItem(key)||"[]")); }
  catch(e){ return new Set(); }
}
function saveSet(key,set){ localStorage.setItem(key, JSON.stringify([...set])); }
let hiddenIds = loadSet("rr_hidden");
let appliedIds = loadSet("rr_applied");
let syncApi = false; // becomes true once /api/state responds (Cloudflare Pages Functions live)

// Cross-device sync: /api/state is a Cloudflare Pages Function backed by KV.
// Until that's set up (or if it's briefly unreachable), everything still works
// on localStorage alone -- this is a strict enhancement layer, never a hard dependency.
async function syncFromServer(){
  try{
    const r = await fetch("/api/state");
    if(!r.ok) return;
    const server = await r.json();
    if(!server || !Array.isArray(server.hidden) || !Array.isArray(server.applied)) return;
    syncApi = true;
    // merge (union) so nothing recorded locally before sync existed gets lost
    server.hidden.forEach(id=>hiddenIds.add(id));
    server.applied.forEach(id=>appliedIds.add(id));
    saveSet("rr_hidden", hiddenIds); saveSet("rr_applied", appliedIds);
    const note = document.getElementById("synclabel");
    if(note) note.textContent = "Hide / Mark applied sync across your devices.";
  }catch(e){ /* API not set up yet or unreachable -- stay on localStorage only */ }
}
function pushAction(act, id){
  if(!syncApi) return;
  fetch("/api/state", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({act, id})}).catch(()=>{});
}

function fresh(iso){
  if(!iso) return "";
  const d = (Date.now() - new Date(iso)) / 86400000;
  if(d < 1) return "today"; if(d < 2) return "yesterday";
  return Math.floor(d) + "d ago";
}
function scoreClass(s){ return s >= 8 ? "s-apply" : s >= GATE ? "" : "s-border"; }

function card(j, reviewed){
  const id = String(j.id||"");
  const s = (j.score ?? 0).toFixed(1);
  const el = document.createElement("div"); el.className = "job" + (reviewed ? " reviewed" : "");
  const dims = (j.dimensions && Object.keys(j.dimensions).length)
    ? `<div class="dims">${DIMS.map(([k,l])=>`${l} <b>${(j.dimensions[k]??0)}</b>`).join("")}</div>` : "";
  let spon = "";
  if(j.sponsor){
    const good = /sponsor/i.test(j.sponsor) && !/not on/i.test(j.sponsor);
    spon = `<span class="tag ${good?'spon':'nospon'}">${j.sponsor}</span>`;
  }
  const flags = (j.flags||[]).map(f=>`<span class="tag flag">${f}</span>`).join("");
  const actions = reviewed
    ? `<div class="actions"><span class="status">${appliedIds.has(id) ? "Applied" : "Hidden"}</span>
        <button data-act="restore" data-id="${id}">Restore</button></div>`
    : `<div class="actions">
        <button data-act="hide" data-id="${id}">Hide</button>
        <button data-act="applied" data-id="${id}">Mark applied</button>
      </div>`;
  el.innerHTML = `
    <div class="row1">
      <div class="score ${scoreClass(j.score)}">${s}</div>
      <div class="hd">
        <div class="title">${j.title||""}</div>
        <div class="company">${[j.company, j.location].filter(Boolean).join(" · ")}</div>
      </div>
    </div>
    ${j.verdict?`<div class="verdict">${j.verdict}</div>`:""}
    <div class="tags">${j.tier?`<span class="tag">${j.tier}</span>`:""}${spon}${flags}</div>
    ${dims}
    <div class="foot">
      <a href="${j.url||'#'}" target="_blank" rel="noopener">View posting &rarr;</a>
      <span class="src">${j.source||""} · ${fresh(j.found_at)}</span>
    </div>
    ${actions}`;
  return el;
}

let allJobs = [], allStatus = {};

function renderAll(){
  const jobs = allJobs.filter(j=>!hiddenIds.has(String(j.id)) && !appliedIds.has(String(j.id)));
  const reviewed = allJobs.filter(j=>hiddenIds.has(String(j.id)) || appliedIds.has(String(j.id)));

  const apply = jobs.filter(j=>(j.score??0) >= GATE);
  const border = jobs.filter(j=>(j.score??0) >= FLOOR && (j.score??0) < GATE);

  const lr = allStatus.last_run ? new Date(allStatus.last_run).toLocaleString("en-GB",
      {day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) : "never";
  document.getElementById("meta").textContent =
      `Netherlands · London · Dublin  ·  ${apply.length} to apply, ${border.length} borderline  ·  last run ${lr}`;

  const a = document.getElementById("apply"); a.innerHTML = "";
  if(apply.length) apply.forEach(j=>a.appendChild(card(j, false)));
  else a.innerHTML = `<div class="empty">No roles at ${GATE}+ yet. The next daily run may surface some.</div>`;

  const borderWrap = document.getElementById("border-wrap"); borderWrap.innerHTML = "";
  if(border.length){
    const d = document.createElement("details"); d.className = "borderline";
    d.innerHTML = `<summary>${border.length} borderline (${FLOOR.toFixed(1)}–${(GATE-0.1).toFixed(1)}) — volume plays, weaker fit</summary>`;
    const box = document.createElement("div"); box.style.marginTop = "10px";
    border.forEach(j=>box.appendChild(card(j, false)));
    d.appendChild(box); borderWrap.appendChild(d);
  }

  const revWrap = document.getElementById("reviewed-wrap"); revWrap.innerHTML = "";
  if(reviewed.length){
    const d = document.createElement("details"); d.className = "reviewed";
    d.innerHTML = `<summary>${reviewed.length} hidden / applied</summary>`;
    const box = document.createElement("div"); box.style.marginTop = "10px";
    reviewed.forEach(j=>box.appendChild(card(j, true)));
    d.appendChild(box); revWrap.appendChild(d);
  }
}

document.body.addEventListener("click", (e)=>{
  const btn = e.target.closest("button[data-act]");
  if(!btn) return;
  const id = btn.dataset.id, act = btn.dataset.act;
  if(act === "hide"){ hiddenIds.add(id); saveSet("rr_hidden", hiddenIds); }
  else if(act === "applied"){ appliedIds.add(id); saveSet("rr_applied", appliedIds); }
  else if(act === "restore"){ hiddenIds.delete(id); appliedIds.delete(id);
    saveSet("rr_hidden", hiddenIds); saveSet("rr_applied", appliedIds); }
  pushAction(act, id);
  renderAll();
});

syncFromServer().then(renderAll);

Promise.all([
  fetch("jobs.json").then(r=>r.json()).catch(()=>[]),
  fetch("status.json").then(r=>r.json()).catch(()=>({})),
]).then(([jobs, status])=>{
  jobs = (jobs||[]).filter(j=>!String(j.id||"").startsWith("demo-"));
  jobs.sort((a,b)=>(b.score??0)-(a.score??0) || String(b.found_at||"").localeCompare(String(a.found_at||"")));
  allJobs = jobs; allStatus = status || {};
  renderAll();

  const s = allStatus.sources || {};
  document.getElementById("sources").innerHTML = "<div style='margin-bottom:6px;font-weight:650'>Sources this run</div>" +
    Object.entries(s).map(([k,v])=>{
      const bad = /fail|skipped|degraded/i.test(v);
      return `<div class="${bad?'bad':'ok'}">${k}: ${v}</div>`;
    }).join("");
}).catch(e=>{ document.getElementById("meta").textContent = "Could not load data: "+e; });
</script>
</body>
</html>
