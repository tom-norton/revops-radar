<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RevOps Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,600;125,800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#117A82; --teal-dark:#0B565C; --ink:#1B2224; --sub:#5D6B6E;
    --bg:#F7F9F9; --card:#FFFFFF; --line:#DCE4E4; --fail:#9AA7A9;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#E8EEEE; --sub:#93A3A5; --bg:#101617; --card:#182022;
           --line:#263235; --fail:#5D6B6E; --teal:#2FA6AE; --teal-dark:#8AD4D9; }
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--bg); color:var(--ink);
       font:15px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif;
       max-width:680px; margin:0 auto; padding:20px 16px 60px}
  .mono{font-family:"IBM Plex Mono",monospace}
  header h1{font-family:"Archivo",sans-serif; font-stretch:125%; font-weight:800;
       font-size:26px; letter-spacing:-.01em}
  header h1 span{color:var(--teal)}
  .meta{color:var(--sub); font-size:12px; margin:4px 0 18px}
  .controls{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap}
  .controls button{font:600 12px "IBM Plex Mono",monospace; padding:7px 12px;
       border:1px solid var(--line); background:var(--card); color:var(--sub);
       border-radius:20px; cursor:pointer}
  .controls button.on{border-color:var(--teal); color:var(--teal)}
  .controls button:focus-visible{outline:2px solid var(--teal); outline-offset:2px}

  .job{background:var(--card); border:1px solid var(--line); border-radius:10px;
       padding:14px 14px 12px; margin-bottom:10px; position:relative}
  .job.dismissed{opacity:.38}
  .row1{display:flex; gap:10px; align-items:flex-start}
  .score{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:17px;
       min-width:44px; text-align:center; padding:6px 0; border-radius:8px;
       background:var(--teal); color:#fff}
  .score.low{background:transparent; color:var(--fail); border:1px solid var(--line)}
  .job h2{font-size:15.5px; line-height:1.3}
  .job h2 a{color:var(--ink); text-decoration:none}
  .job h2 a:hover{color:var(--teal)}
  .co{color:var(--sub); font-size:13px; margin-top:2px}
  .verdict{font-size:13.5px; margin-top:8px; color:var(--ink)}
  .flags{margin-top:6px; display:flex; gap:6px; flex-wrap:wrap}
  .flag{font:11px "IBM Plex Mono",monospace; color:#8A4B08; background:#FBEEDD;
       padding:2px 7px; border-radius:4px}
  @media (prefers-color-scheme: dark){ .flag{color:#F0B36B; background:#3A2A14} }
  .spon{font:600 11px "IBM Plex Mono",monospace; padding:2px 7px; border-radius:4px;
       margin-top:6px; display:inline-block}
  .spon.yes{color:#0B565C; background:#D6EFF1}
  .spon.maybe{color:#5D6B6E; background:#E8EDED}
  .spon.no{color:#8A2B2B; background:#F7DEDE}
  @media (prefers-color-scheme: dark){
    .spon.yes{color:#8AD4D9; background:#123A3D} .spon.maybe{color:#93A3A5; background:#232D2F}
    .spon.no{color:#F0A0A0; background:#3A1E1E} }
  .foot{display:flex; justify-content:space-between; margin-top:10px; align-items:center}
  .date{font:11px "IBM Plex Mono",monospace; color:var(--sub)}
  .dismiss{font:11px "IBM Plex Mono",monospace; background:none; border:none;
       color:var(--sub); cursor:pointer; text-decoration:underline; padding:4px}

  .gate{display:flex; align-items:center; gap:10px; margin:22px 0 14px;
       color:var(--teal); font:600 12px "IBM Plex Mono",monospace;
       text-transform:uppercase; letter-spacing:.08em}
  .gate::before,.gate::after{content:""; flex:1; border-top:2px dashed var(--teal); opacity:.5}

  .status{margin-top:34px; border-top:1px solid var(--line); padding-top:14px;
       font:12px "IBM Plex Mono",monospace; color:var(--sub)}
  .status b{color:var(--ink); font-weight:600}
  .status details{margin-top:6px}
  .empty{color:var(--sub); padding:30px 0; text-align:center}
</style>
</head>
<body>
<header>
  <h1>RevOps <span>Radar</span></h1>
  <div class="meta mono" id="meta">loading…</div>
</header>

<div class="controls">
  <button id="tAll">show below gate</button>
  <button id="tSpon">hide non-sponsors</button>
  <button id="tDis">show dismissed</button>
</div>

<div id="list"><div class="empty">Loading jobs…</div></div>

<div class="status" id="status"></div>

<script>
const GATE = 5;
let showLow = false, showDis = false, jobs = [], status = {};
const dismissed = new Set(JSON.parse(localStorage.getItem("dismissed") || "[]"));

const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtDate = iso => iso ? iso.slice(0,10) : "";
const sponClass = raw => raw==="on_register"||raw==="likely" ? "yes" : raw==="not_found" ? "no" : "maybe";
let sponOnly = false;

function card(j){
  const dis = dismissed.has(j.id);
  const low = (j.score||0) < GATE;
  return `<div class="job ${dis?"dismissed":""}">
    <div class="row1">
      <div class="score ${low?"low":""}">${(j.score||0).toFixed(1)}</div>
      <div>
        <h2><a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a></h2>
        <div class="co">${esc(j.company || j.source)}${j.location?" · "+esc(j.location):""}${j.tier?" · "+esc(j.tier):""}</div>
      </div>
    </div>
    ${j.sponsor?`<span class="spon ${sponClass(j.sponsor_raw)}">${esc(j.sponsor)}</span>`:""}
    ${j.verdict?`<div class="verdict">${esc(j.verdict)}</div>`:""}
    ${(j.flags||[]).length?`<div class="flags">${j.flags.map(f=>`<span class="flag">${esc(f)}</span>`).join("")}</div>`:""}
    <div class="foot">
      <span class="date">${fmtDate(j.found_at)} · ${esc(j.source)}</span>
      <button class="dismiss" data-id="${esc(j.id)}">${dis?"restore":"dismiss"}</button>
    </div>
  </div>`;
}

function render(){
  const vis = jobs.filter(j => (showDis || !dismissed.has(j.id)))
                  .filter(j => !sponOnly || j.sponsor_raw !== "not_found");
  const pass = vis.filter(j => (j.score||0) >= GATE).sort((a,b)=>b.score-a.score || (b.found_at>a.found_at?1:-1));
  const fail = vis.filter(j => (j.score||0) < GATE);
  let html = pass.map(card).join("") || `<div class="empty">Nothing above the gate right now.</div>`;
  if (showLow && fail.length) html += `<div class="gate">gate · ${GATE.toFixed(1)}</div>` + fail.map(card).join("");
  document.getElementById("list").innerHTML = html;
  document.querySelectorAll(".dismiss").forEach(b => b.onclick = () => {
    const id = b.dataset.id;
    dismissed.has(id) ? dismissed.delete(id) : dismissed.add(id);
    localStorage.setItem("dismissed", JSON.stringify([...dismissed]));
    render();
  });
  document.getElementById("meta").textContent =
    `${pass.length} above gate · ${fail.length} below · last scan ${fmtDate(status.last_run) || "unknown"}`;
}

function renderStatus(){
  const src = status.sources || {};
  const bad = Object.entries(src).filter(([,v]) => !String(v).startsWith("ok"));
  document.getElementById("status").innerHTML =
    `<b>sources:</b> ${Object.keys(src).length - bad.length} ok, ${bad.length} failing
     <details><summary>details</summary>${
       Object.entries(src).map(([k,v])=>`${esc(k)}: ${esc(String(v))}`).join("<br>")
     }</details>`;
}

document.getElementById("tAll").onclick = e => { showLow=!showLow; e.target.classList.toggle("on"); render(); };
document.getElementById("tSpon").onclick = e => { sponOnly=!sponOnly; e.target.classList.toggle("on"); render(); };
document.getElementById("tDis").onclick = e => { showDis=!showDis; e.target.classList.toggle("on"); render(); };

Promise.all([
  fetch("jobs.json").then(r=>r.json()).catch(()=>[]),
  fetch("status.json").then(r=>r.json()).catch(()=>({})),
]).then(([j,s]) => { jobs=j; status=s; render(); renderStatus(); });
</script>
</body>
</html>
