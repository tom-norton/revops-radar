name: Daily job scan

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (~8am Barcelona)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests python-jobspy
      - name: Run scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
        run: python scan.py
      - name: Commit results
        run: |
          git config user.name "radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json docs/jobs.json docs/status.json nl_sponsors_extra.txt 2>/dev/null || git add seen.json docs/jobs.json docs/status.json
          git diff --cached --quiet || git commit -m "scan: $(date -u +%F)"
          git push
